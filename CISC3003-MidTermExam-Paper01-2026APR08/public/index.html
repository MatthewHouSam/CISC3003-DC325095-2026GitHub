<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Replace YOUR_UM_STUDENT_ID and YOUR_FULL_NAME with your real UM credentials (required for grading). -->
  <title>YOUR_UM_STUDENT_ID - YOUR_FULL_NAME</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page">
    <main class="main-card" aria-label="Sign in or sign up">
      <div class="container" id="container">
        <div class="form-container sign-up-container">
          <form class="form" id="registerForm" action="#" method="post">
            <h1 class="form-title">Join Us</h1>
            <div class="social-container">
              <a href="#" class="social social-fb" aria-label="Facebook"><span>f</span></a>
              <a href="#" class="social social-g" aria-label="Google"><span>G+</span></a>
              <a href="#" class="social social-in" aria-label="LinkedIn"><span>in</span></a>
            </div>
            <span class="hint">Use your email to sign up</span>
            <label class="sr-only" for="reg-name">Full Name</label>
            <input class="input" id="reg-name" name="fullname" type="text" placeholder="Full Name" required autocomplete="name">
            <label class="sr-only" for="reg-email">Email</label>
            <input class="input" id="reg-email" name="email" type="email" placeholder="Email" required autocomplete="email">
            <label class="sr-only" for="reg-password">Create Password</label>
            <input class="input" id="reg-password" name="password" type="password" placeholder="Create Password" required autocomplete="new-password">
            <button class="btn btn-primary" type="submit">REGISTER</button>
          </form>
        </div>
        <div class="form-container sign-in-container">
          <form class="form" id="loginForm" action="#" method="post">
            <h1 class="form-title">Log In</h1>
            <div class="social-container">
              <a href="#" class="social social-fb" aria-label="Facebook"><span>f</span></a>
              <a href="#" class="social social-g" aria-label="Google"><span>G+</span></a>
              <a href="#" class="social social-in" aria-label="LinkedIn"><span>in</span></a>
            </div>
            <span class="hint">Use your account to sign in</span>
            <label class="sr-only" for="login-email">Email</label>
            <input class="input" id="login-email" name="email" type="email" placeholder="Email" required autocomplete="email">
            <label class="sr-only" for="login-password">Password</label>
            <input class="input" id="login-password" name="password" type="password" placeholder="Password" required autocomplete="current-password">
            <a class="forgot" href="#">Forgot Password?</a>
            <button class="btn btn-primary" type="submit">SIGN IN</button>
          </form>
        </div>
        <div class="overlay-container">
          <div class="overlay">
            <div class="overlay-panel overlay-left">
              <h2 class="overlay-title">Hello, Again!</h2>
              <div class="art art-avatar" aria-hidden="true">
                <img src="images/website_7376495.png" alt="">
              </div>
              <p class="overlay-text">Log in to stay connected with us</p>
              <button type="button" class="btn btn-ghost" id="btnShowSignIn">SIGN IN</button>
            </div>
            <div class="overlay-panel overlay-right">
              <h2 class="overlay-title">Welcome!</h2>
              <div class="art art-mail" aria-hidden="true">
                <img src="images/unsecure_10399884.png" alt="">
              </div>
              <p class="overlay-text">Enter your details to start your journey</p>
              <button type="button" class="btn btn-ghost" id="btnShowSignUp">SIGN UP</button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="site-footer">
      CISC3003 Web Programming: YOUR_UM_STUDENT_ID YOUR_FULL_NAME 2026
    </footer>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
