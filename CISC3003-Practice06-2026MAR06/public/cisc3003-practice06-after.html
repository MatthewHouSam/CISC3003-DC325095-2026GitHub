<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
		
	<title>CISC3003 - Practice 06</title>
	<link href="css/styles.css" rel="stylesheet">
	<script src="js/data.js"></script>
	<script src="js/functions.js"></script>
</head>

<body>
<div class="title">
    <h1>Shopping Cart</h1>
</div>
<table class="table-fill">
    <thead>
        <tr>
            <th colspan="2">Product</th>
            <th>#</th>
            <th>Price</th>
            <th>Amount</th>
        </tr>
    </thead>
    <script src="js/cisc3003-practice06.js"></script>
    <tbody>
        <tr class="totals">
            <td>Subtotal</td>
            <td></td>
            <td></td>
            <td></td>
            <td class="right"><script>document.write(outputCurrency(subtotal));</script></td>
        </tr>
        <tr class="totals">
            <td>Tax</td>
            <td></td>
            <td></td>
            <td></td>
            <td class="right"><script>document.write(outputCurrency(tax));</script></td>
        </tr>
        <tr class="totals">
            <td>Shipping</td>
            <td></td>
            <td></td>
            <td></td>
            <td class="right"><script>document.write(outputCurrency(shipping));</script></td>
        </tr>
        <tr class="totals focus">
            <td>Grand Total</td>
            <td></td>
            <td></td>
            <td></td>
            <td class="right"><script>document.write(outputCurrency(grandTotal));</script></td>
        </tr>
    </tbody>
</table>
</body>
</html>
